<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Jameer</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <meta name="description" content="Personal portfolio website coming soon. Stay tuned!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0b;
      --surface: #212121;
      --border: #353535;
      --text: #ffffff;
      --text-secondary: #b9b9b9;
      --text-tertiary: #797979;
      --cta: #f36458;
      --interactive: #0052ef;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #262645 0%, #0b0b0b 50%, #0b0b0b 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease-out forwards;
    }

    .fade-in-delay-1 { animation-delay: 0.1s; }
    .fade-in-delay-2 { animation-delay: 0.2s; }
    .fade-in-delay-3 { animation-delay: 0.3s; }
    .fade-in-delay-4 { animation-delay: 0.4s; }
    .fade-in-delay-5 { animation-delay: 0.5s; }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.69rem;
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .name {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, #ffffff 0%, #b9b9b9 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: 1.25rem;
      color: var(--text-secondary);
      margin-bottom: 3rem;
      line-height: 1.5;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin-bottom: 3rem;
    }

    .countdown-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .countdown-value {
      font-size: 4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .countdown-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.69rem;
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.75rem;
    }

    .form-container {
      margin-bottom: 3rem;
    }

    .form-container p {
      color: var(--text-secondary);
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .signup-form {
      display: flex;
      gap: 0.5rem;
      max-width: 400px;
      margin: 0 auto;
      flex-wrap: wrap;
      justify-content: center;
    }

    .signup-form input[type="email"] {
      flex: 1;
      min-width: 200px;
      padding: 0.875rem 1rem;
      border: 1px solid var(--surface);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .signup-form input[type="email"]::placeholder {
      color: var(--text-tertiary);
    }

    .signup-form input[type="email"]:focus {
      border-color: var(--interactive);
      box-shadow: 0 0 0 2px rgba(0, 82, 239, 0.2);
    }

    .signup-form button {
      padding: 0.875rem 1.5rem;
      background: var(--cta);
      color: white;
      border: none;
      border-radius: 99999px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      position: relative;
      min-width: 120px;
    }

    .signup-form button:hover:not(:disabled) {
      background: var(--interactive);
    }

    .signup-form button:active:not(:disabled) {
      transform: scale(0.98);
    }

    .signup-form button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-text, .btn-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-loader {
      display: none;
    }

    .signup-form button.loading .btn-text {
      display: none;
    }

    .signup-form button.loading .btn-loader {
      display: flex;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .social-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s, transform 0.2s;
    }

    .social-link:hover {
      color: var(--interactive);
      transform: translateY(-2px);
    }

    .social-link:focus {
      outline: 2px solid var(--interactive);
      outline-offset: 4px;
      border-radius: 4px;
    }

    .social-icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .social-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.69rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    footer {
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }

    .success-message {
      display: none;
      color: #19d600;
      padding: 1rem;
      font-size: 0.9rem;
    }

    .success-message.show {
      display: block;
      animation: fadeInUp 0.5s ease-out forwards;
    }

    .error-message {
      display: none;
      color: #dd0000;
      padding: 0.5rem 0;
      font-size: 0.85rem;
    }

    .error-message.show {
      display: block;
    }

    @media (max-width: 480px) {
      .name {
        font-size: 2.5rem;
      }

      .countdown {
        gap: 1.25rem;
      }

      .countdown-value {
        font-size: 2.5rem;
      }

      .countdown-label {
        font-size: 0.6rem;
      }

      .signup-form {
        flex-direction: column;
      }

      .signup-form button {
        width: 100%;
      }

      .social-links {
        gap: 1.5rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .fade-in, .spinner {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="label fade-in">Coming Soon</div>
    <h1 class="name fade-in fade-in-delay-1">Jameer</h1>
    <p class="tagline fade-in fade-in-delay-2">Building something amazing.<br>Stay tuned!</p>

    <div class="countdown fade-in fade-in-delay-3" role="timer" aria-live="polite" aria-atomic="true">
      <div class="countdown-item">
        <span class="countdown-value" id="days" aria-label="Days">00</span>
        <span class="countdown-label">Days</span>
      </div>
      <div class="countdown-item">
        <span class="countdown-value" id="hours" aria-label="Hours">00</span>
        <span class="countdown-label">Hours</span>
      </div>
      <div class="countdown-item">
        <span class="countdown-value" id="minutes" aria-label="Minutes">00</span>
        <span class="countdown-label">Minutes</span>
      </div>
      <div class="countdown-item">
        <span class="countdown-value" id="seconds" aria-label="Seconds">00</span>
        <span class="countdown-label">Seconds</span>
      </div>
    </div>

    <div class="form-container fade-in fade-in-delay-4">
      <p id="form-description">Get notified when I launch</p>
      <form class="signup-form" action="https://formspree.io/f/xgoryppl" method="POST" id="notify-form" aria-describedby="form-description">
        <input type="email" name="email" placeholder="Enter your email" required aria-label="Email address" autocomplete="email">
        <button type="submit" aria-disabled="false">
          <span class="btn-text">Notify Me</span>
          <span class="btn-loader" aria-hidden="true">
            <span class="spinner"></span>
            <span>Sending</span>
          </span>
        </button>
      </form>
      <div class="success-message" id="success" role="status" aria-live="polite">Thanks! I'll notify you when I launch.</div>
      <div class="error-message" id="error" role="alert" aria-live="assertive"></div>
    </div>

    <nav class="social-links fade-in fade-in-delay-5" aria-label="Social media links">
      <a href="https://linkedin.com/in/jameeronline" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="LinkedIn profile">

        </svg>
        <span class="social-name">LinkedIn</span>
      </a>
      <a href="https://github.com/jameeronline" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="GitHub profile">
        <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 18.592 24 12.297c0-6.627-5.373-12-12-12"/>

      </a>
      <a href="https://twitter.com/jameeronline" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Twitter profile">

    </nav>

    <footer>
      &copy; 2026 Jameer. All rights reserved.
    </footer>
  </div>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DXLM70TZ8N"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-DXLM70TZ8N');
  </script>

  <script>
    const targetDate = new Date('2026-06-19T00:00:00');

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    const form = document.getElementById('notify-form');
    const submitBtn = form.querySelector('button[type="submit"]');
    const success = document.getElementById('success');
    const error = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;
      submitBtn.setAttribute('aria-disabled', 'true');
      error.classList.remove('show');
      error.textContent = '';

      const formData = new FormData(form);
      const action = form.getAttribute('action');

      try {
        const response = await fetch(action, {
          method: 'POST',
          body: formData,
          headers: {
            'Accept': 'application/json'
          }
        });

        if (response.ok) {
          form.style.display = 'none';
          success.classList.add('show');
          form.querySelector('input[name="email"]').setAttribute('aria-invalid', 'false');
        } else {
          throw new Error('Submission failed');
        }
      } catch (err) {
        error.textContent = 'Something went wrong. Please try again.';
        error.classList.add('show');
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
        submitBtn.setAttribute('aria-disabled', 'false');
      }
    });
  </script>
</body>
</html>
